<!DOCTYPE html>
<html>
  <body>
    <!-- Static form skeleton for Netlify build-time registration. Never shown to users. -->
    <form name="interest" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="tour" />
      <input type="text" name="source" />
      <textarea name="message"></textarea>
      <input type="text" name="bot-field" />
    </form>
  </body>
</html>
